<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>This Month's Selection</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="container">
      <div id="titulo-principal">
        <label>This Month's Selection</label>
      </div>

      <div id="item-one" class="box">
        <img
          src="imagen/imag1.png"
          alt="Braided Challah"
        />
        <h3>Braided Challah that would make Bubbe proud!</h3>
        <label>
          Our braided challah bread is a traditional Jewish bread characterized
          by its rich golden-brown crust and soft, slightly sweet interior.
        </label>
      </div>

      <div id="item-two" class="box">
        <img
          src="imagen/imag2.jpg"
          alt="French Boule"
        />
        <h3>Ain't no boule like a French Boule</h3>
        <label>
          Our French boule is a round, rustic loaf of bread characterized by its
          chewy crust and soft, airy interior.
        </label>
      </div>

      <div id="item-three" class="box">
        <img
          src="imagen/imag3.jpg"
          alt="Uzbek bread"
        />

        <div id="texto-item-three">
          <h3>Have you tried Uzbek bread?</h3>
          <label>
            Uzbek bread is not just a culinary delight but a cultural treasure
            that reflects the warmth, generosity, and tradition of Uzbekistan.
          </label>
        </div>
      </div>
    </div>
  </body>
</html>
